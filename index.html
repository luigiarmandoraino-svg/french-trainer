<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#061427" />
  <title>French A1-C2</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="mascot" aria-hidden="true">🇫🇷</div>
        <div>
          <h1>French A1-C2</h1>
          <p>Choose your CEFR level · interactive French practice</p>
        </div>
      </div>
      <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme">🌙</button>
    </header>

    <section class="progress-card" id="progressCard">
      <div class="progress-copy">
        <span id="progressLabel">Choose your level</span>
        <strong id="lessonTitle">Loading…</strong>
      </div>
      <div class="total-score" id="totalScore">Total score: 0 / 0</div>
      <div class="progress-track" aria-hidden="true"><div id="progressFill"></div></div>
    </section>

    <main id="app" class="main-content"></main>

    <nav class="bottom-nav" id="bottomNav" aria-label="Lesson navigation">
      <button id="prevBtn" type="button">←</button>
      <select id="lessonSelect" aria-label="Choose class"></select>
      <button id="nextBtn" type="button">→</button>
    </nav>
  </div>

  <template id="lessonTemplate">
    <section class="lesson-card hero-card">
      <div class="hero-topline">
        <div class="pill" data-field="classPill"></div>
        <button class="ghost-btn small-btn" id="changeLevelBtn" type="button">Change level</button>
      </div>
      <h2 data-field="title"></h2>
      <p data-field="objective"></p>
      <div class="tab-row" role="tablist" aria-label="Lesson sections">
        <button class="tab active" data-tab="learn" type="button">Learn</button>
        <button class="tab" data-tab="sentences" type="button">Sentences</button>
        <button class="tab" data-tab="practice" type="button">Practice</button>
        <button class="tab" data-tab="exam" type="button">Exam</button>
      </div>
    </section>
    <section id="tabContent"></section>
  </template>

  <script src="script.js"></script>
</body>
</html>
