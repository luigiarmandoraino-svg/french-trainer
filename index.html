<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#58cc02" />
  <title>French B1 Telegram App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="mascot" aria-hidden="true">🇫🇷</div>
        <div> 
          <h1>French B1</h1>
          <p>50 Duolingo-style classes · no AI · offline content</p>
        </div>
      </div>
      <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme">☀️</button>
    </header>

    <section class="progress-card">
      <div class="progress-copy">
        <span id="progressLabel">Class 1 of 50</span>
        <strong id="lessonTitle">Loading…</strong>
      </div>
      <div class="progress-track" aria-hidden="true"><div id="progressFill"></div></div>
    </section>

    <main id="app" class="main-content"></main>

    <nav class="bottom-nav" aria-label="Lesson navigation">
      <button id="prevBtn" type="button">← Previous</button>
      <select id="lessonSelect" aria-label="Choose class"></select>
      <button id="nextBtn" type="button">Next →</button>
    </nav>
  </div>

  <template id="lessonTemplate">
    <section class="lesson-card hero-card">
      <div class="pill" data-field="classPill"></div>
      <h2 data-field="title"></h2>
      <p data-field="objective"></p>
      <div class="tab-row" role="tablist" aria-label="Lesson sections">
        <button class="tab active" data-tab="learn" type="button">Learn</button>
        <button class="tab" data-tab="sentences" type="button">Sentences</button>
        <button class="tab" data-tab="practice" type="button">Practice</button>
        <button class="tab" data-tab="exam" type="button">Exam</button>
      </div>
    </section>
    <section id="tabContent"></section>
  </template>

  <script src="script.js"></script>
</body>
</html>
